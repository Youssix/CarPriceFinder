<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="icon-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Logo icon "C" -->
  <circle cx="600" cy="240" r="70" fill="none" stroke="url(#icon-grad)" stroke-width="12" stroke-dasharray="330 110" stroke-linecap="round" transform="rotate(-45, 600, 240)"/>

  <!-- Brand name -->
  <text x="600" y="370" text-anchor="middle" font-family="'Space Grotesk', 'SF Pro Display', -apple-system, sans-serif" font-weight="700" font-size="72">
    <tspan fill="#60a5fa">Car</tspan><tspan fill="#a78bfa">lytics</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="420" text-anchor="middle" font-family="'SF Pro Display', -apple-system, sans-serif" font-size="28" fill="rgba(255,255,255,0.6)">
    Trouvez les meilleures affaires VO en 2 minutes
  </text>

  <!-- Bottom accent line -->
  <rect x="480" y="470" width="240" height="3" rx="2" fill="url(#text-grad)" opacity="0.6"/>

  <!-- Corner accents -->
  <circle cx="100" cy="530" r="120" fill="#3b82f6" opacity="0.05"/>
  <circle cx="1100" cy="100" r="150" fill="#8b5cf6" opacity="0.05"/>
</svg>
