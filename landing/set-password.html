<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carlytics — Définir votre mot de passe</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%231a1a2e'/><path d='M72 26 A30 30 0 1 0 72 74' stroke='url(%23g)' stroke-width='13' fill='none' stroke-linecap='round'/><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%2360a5fa'/><stop offset='100%25' stop-color='%23a78bfa'/></linearGradient></defs></svg>">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .subtitle {
      color: rgba(255,255,255,0.45);
      font-size: 14px;
      margin-bottom: 36px;
    }

    .form-group {
      margin-bottom: 14px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      margin-bottom: 6px;
    }

    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      color: white;
      font-size: 15px;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: #3b82f6;
    }
    input[type="password"]::placeholder {
      color: rgba(255,255,255,0.25);
    }

    .hint {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      margin-top: 6px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 8px;
    }
    .btn:hover { background: #2563eb; }
    .btn:disabled { background: #374151; cursor: not-allowed; }

    .message {
      margin-top: 20px;
      padding: 14px 18px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }
    .message.success {
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #6ee7b7;
    }
    .message.error {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    .back-link {
      display: inline-block;
      margin-top: 24px;
      color: rgba(255,255,255,0.35);
      font-size: 13px;
      text-decoration: none;
    }
    .back-link:hover { color: rgba(255,255,255,0.7); }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">Carlytics</div>
    <p class="subtitle" id="pageSubtitle">Choisissez votre mot de passe</p>

    <div id="formSection">
      <div class="form-group">
        <label for="password">Nouveau mot de passe</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" />
        <p class="hint">8 caractères minimum</p>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmer le mot de passe</label>
        <input type="password" id="confirmPassword" placeholder="••••••••" autocomplete="new-password" />
      </div>

      <button class="btn" id="submitBtn">Définir mon mot de passe</button>
    </div>

    <div class="message" id="messageBox"></div>

    <a href="https://carlytics.fr" class="back-link">← Retour à carlytics.fr</a>
  </div>

  <script>
    // Determine API URL: localhost in dev, prod otherwise
    const API_SERVERS = ['http://localhost:9001', 'https://api.carlytics.fr'];

    // Get token from URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      document.getElementById('formSection').style.display = 'none';
      const box = document.getElementById('messageBox');
      box.className = 'message error';
      box.innerHTML = `
        <strong>Lien manquant ou invalide.</strong><br><br>
        Pour recevoir un nouveau lien, utilisez <strong>"Mot de passe oublié ?"</strong>
        dans l'extension Carlytics, ou
        <a href="mailto:contact@carlytics.fr" style="color:#93c5fd;">contactez-nous</a>.
      `;
      box.style.display = 'block';
    }

    function showError(msg) {
      const box = document.getElementById('messageBox');
      box.className = 'message error';
      box.textContent = msg;
      box.style.display = 'block';
    }

    function showSuccess(msg) {
      const box = document.getElementById('messageBox');
      box.className = 'message success';
      box.innerHTML = msg;
      box.style.display = 'block';
    }

    async function callServer(path, body) {
      for (const server of API_SERVERS) {
        try {
          const res = await fetch(`${server}${path}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
            signal: AbortSignal.timeout(5000)
          });
          const data = await res.json().catch(() => ({}));
          return { ok: res.ok, status: res.status, data };
        } catch (e) {
          // Try next server
        }
      }
      return null;
    }

    document.getElementById('submitBtn').addEventListener('click', async () => {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('submitBtn');

      // Validation
      if (password.length < 8) {
        showError('Le mot de passe doit contenir au moins 8 caractères.');
        return;
      }
      if (password !== confirm) {
        showError('Les mots de passe ne correspondent pas.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Enregistrement…';

      const result = await callServer('/api/auth/set-password', { token, password });

      btn.disabled = false;
      btn.textContent = 'Définir mon mot de passe';

      if (!result) {
        showError('Serveur inaccessible. Réessayez dans quelques instants.');
        return;
      }

      if (!result.ok) {
        showError(result.data?.error || 'Lien invalide ou expiré. Utilisez "Mot de passe oublié ?" dans l\'extension.');
        document.getElementById('formSection').style.display = 'none';
        return;
      }

      // Succès
      document.getElementById('formSection').style.display = 'none';
      showSuccess('✓ Mot de passe défini avec succès !<br><br>Vous pouvez maintenant vous connecter à l\'extension Carlytics avec votre email et ce mot de passe.');
    });

    // Allow Enter key on confirm field
    document.getElementById('confirmPassword').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('submitBtn').click();
    });
  </script>

</body>
</html>
