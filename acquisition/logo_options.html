<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@700;800&display=swap" rel="stylesheet">
</head>
<body style="background:#e8e8e8; padding: 50px; font-family: Arial, sans-serif;">

<p style="color:#999; font-size:11px; margin-bottom:10px;">Référence :</p>
<div style="margin-bottom:40px; background:white; padding:20px 28px; display:inline-block; border-radius:10px;">
  <img src="sendr.png" height="28">
</div>

<br>

<!-- Variante A : deux pentagones superposés décalés (exact style Sendr) -->
<div style="margin-bottom:24px; background:white; padding:26px 36px; display:inline-block; border-radius:12px;">
  <p style="color:#ccc; font-size:10px; margin:0 0 14px; letter-spacing:1px; text-transform:uppercase;">A — Deux formes superposées</p>
  <div style="display:flex; align-items:center; gap:10px;">
    <svg width="28" height="32" viewBox="0 0 28 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- forme du bas -->
      <path d="M2 18 L8 10 L20 10 L26 18 L14 28 Z" fill="#1a1a1a"/>
      <!-- forme du haut, décalée -->
      <path d="M2 14 L8 4 L22 4 L26 14 L14 22 Z" fill="#1a1a1a" opacity="0.35"/>
    </svg>
    <span style="font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:700; color:#111; letter-spacing:-0.5px;">Carl<span style="color:#1a73e8;">ytics</span></span>
  </div>
</div>

<br>

<!-- Variante B : deux feuilles/ailes dynamiques -->
<div style="margin-bottom:24px; background:white; padding:26px 36px; display:inline-block; border-radius:12px;">
  <p style="color:#ccc; font-size:10px; margin:0 0 14px; letter-spacing:1px; text-transform:uppercase;">B — Deux ailes</p>
  <div style="display:flex; align-items:center; gap:10px;">
    <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M15 2 C8 2 2 8 2 15 L15 28 Z" fill="#1a1a1a"/>
      <path d="M15 2 C22 2 28 8 28 15 L15 28 Z" fill="#1a1a1a" opacity="0.4"/>
    </svg>
    <span style="font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:700; color:#111; letter-spacing:-0.5px;">Carl<span style="color:#1a73e8;">ytics</span></span>
  </div>
</div>

<br>

<!-- Variante C : copie exacte style Sendr (deux hexagones en S) -->
<div style="margin-bottom:24px; background:white; padding:26px 36px; display:inline-block; border-radius:12px;">
  <p style="color:#ccc; font-size:10px; margin:0 0 14px; letter-spacing:1px; text-transform:uppercase;">C — Style Sendr exact</p>
  <div style="display:flex; align-items:center; gap:10px;">
    <svg width="26" height="32" viewBox="0 0 26 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- hexagone bas -->
      <path d="M13 32 L1 25 L1 17 L13 18 L25 17 L25 25 Z" fill="#1a1a1a"/>
      <!-- hexagone haut -->
      <path d="M13 18 L1 15 L1 7 L13 0 L25 7 L25 15 Z" fill="#1a1a1a" opacity="0.4"/>
    </svg>
    <span style="font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:700; color:#111; letter-spacing:-0.5px;">Carl<span style="color:#1a73e8;">ytics</span></span>
  </div>
</div>

<br>

<!-- Variante D : deux parallelogrammes décalés -->
<div style="margin-bottom:24px; background:white; padding:26px 36px; display:inline-block; border-radius:12px;">
  <p style="color:#ccc; font-size:10px; margin:0 0 14px; letter-spacing:1px; text-transform:uppercase;">D — Parallelogrammes</p>
  <div style="display:flex; align-items:center; gap:10px;">
    <svg width="28" height="30" viewBox="0 0 28 30" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="4,28 0,18 16,18 20,28" fill="#1a1a1a"/>
      <polygon points="8,18 4,8 24,8 28,18" fill="#1a1a1a" opacity="0.35"/>
      <polygon points="12,8 8,0 24,0 28,8" fill="#1a1a1a" opacity="0.15"/>
    </svg>
    <span style="font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:700; color:#111; letter-spacing:-0.5px;">Carl<span style="color:#1a73e8;">ytics</span></span>
  </div>
</div>

</body>
</html>
