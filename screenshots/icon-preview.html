<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><style>
body { background:#e5e5e5; display:flex; gap:24px; align-items:flex-end; padding:40px; font-family:sans-serif; }
div { text-align:center; }
img { display:block; image-rendering:pixelated; }
p { font-size:12px; color:#555; margin:6px 0 0; }
</style></head>
<body>
  <div><img src="../icons/icon128.png" width="128" height="128"><p>128×128</p></div>
  <div><img src="../icons/icon48.png" width="48" height="48"><p>48×48</p></div>
  <div><img src="../icons/icon16.png" width="16" height="16"><p>16×16</p></div>
  <div><img src="../icons/icon48.png" width="192" height="192" style="image-rendering:auto"><p>48 ×4 zoom</p></div>
  <div><img src="../icons/icon16.png" width="128" height="128" style="image-rendering:auto"><p>16 ×8 zoom</p></div>
</body>
</html>
